<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <title>VOYAGESPHERE - Feedback Form</title>
</head>

<title>VOYAGESPHERE - Home</title> <!-- Title that appears in the browser tab -->
<body> 
    <header>
        <nav>
            <div class="logo">
                <h1>VOYAGESPHERE</h1>
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="catalogue.html">Catalogue</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li><a href="feedback.html">Feedback</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h1>Feedback Form</h1>
            <form id="feedbackForm">
                <fieldset>
                    <legend>Please provide your feedback:</legend>

                    <div>
                        <label>
                            <input type="radio" name="feedbackType" value="General" required>
                            General Feedback
                        </label><br>
                        <label>
                            <input type="radio" name="feedbackType" value="Suggestion">
                            Suggestions
                        </label><br>
                        <label>
                            <input type="radio" name="feedbackType" value="Issue">
                            Report an Issue
                        </label>
                    </div>

                    <label for="userMessage">Your Message:</label>
                    <textarea id="userMessage" name="userMessage" rows="5" required placeholder="Type your message here..."></textarea>
                    <button type="submit" class="btn">Submit Feedback</button>
                </fieldset>
            </form>
            <!-- Success popup when feedback is submitted -->
            <div id="successMessage" class="hidden popup">
                <div class="popup-content">
                    <span class="close" id="closePopupFeedback">&times;</span>
                    <p>Your feedback has been submitted successfully!</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 VOYAGESPHERE. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
